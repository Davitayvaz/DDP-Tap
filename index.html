<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meme Board">
<meta name="theme-color" content="#1B1533">
<title>Meme Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1B1533;
    --bg-deep: #120D24;
    --card: #FFF8EC;
    --ink: #241C42;
    --ink-soft: #6b6285;
    --coral: #FF5D73;
    --yellow: #FFD23F;
    --teal: #3FE1B0;
    --line: rgba(255,248,236,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 8%, rgba(255,93,115,0.16), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(63,225,176,0.14), transparent 45%),
      var(--bg);
    color: var(--card);
    font-family: 'Inter', sans-serif;
    overflow:hidden;
    height:100vh;
    display:flex;
    flex-direction:column;
    user-select:none;
    -webkit-user-select:none;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  .fredoka{ font-family:'Fredoka', sans-serif; }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: max(14px, env(safe-area-inset-top)) 16px 6px;
    flex-shrink:0;
  }
  .brand{
    font-family:'Fredoka', sans-serif; font-weight:700; font-size:20px;
    letter-spacing:0.3px; display:flex; align-items:center; gap:8px;
  }
  .brand .dot{ width:10px; height:10px; border-radius:50%; background:var(--coral); box-shadow:0 0 10px var(--coral); }
  .iconbtn{
    width:38px; height:38px; border-radius:12px; border:1px solid var(--line);
    background: rgba(255,248,236,0.06); color:var(--card);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .iconbtn:active{ background: rgba(255,248,236,0.14); }

  .chiprow{
    display:flex; gap:8px; padding: 6px 16px 14px; overflow-x:auto;
    flex-shrink:0; scrollbar-width:none;
  }
  .chiprow::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0; padding:8px 14px; border-radius:999px; font-size:13px; font-weight:600;
    background: rgba(255,248,236,0.07); border:1px solid var(--line); color: rgba(255,248,236,0.75);
    white-space:nowrap; cursor:pointer;
  }
  .chip.active{ background:var(--yellow); color:var(--ink); border-color:var(--yellow); }
  .chip.addnew{ color:var(--teal); border-style:dashed; }

  .stage{
    flex:1; position:relative; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start; padding-top:6px; min-height:0;
  }
  .stack{
    position:relative; width:100%; max-width:340px; height:190px;
    display:flex; align-items:center; justify-content:center;
    touch-action: pan-y;
  }
  .card{
    position:absolute; width:230px; height:150px; border-radius:20px;
    background:var(--card); color:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:14px; text-align:center; gap:6px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.35);
    transition: transform .25s ease, opacity .25s ease;
    border: 3px solid var(--ink);
  }
  .card .name{ font-family:'Fredoka', sans-serif; font-weight:600; font-size:17px; line-height:1.2;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; word-break:break-word; }
  .card .len{ font-size:11px; color:var(--ink-soft); }
  .card.side{ pointer-events:none; }
  .card.prev{ transform: translateX(-120px) rotate(-8deg) scale(0.85); opacity:0.55; z-index:1; }
  .card.next{ transform: translateX(120px) rotate(8deg) scale(0.85); opacity:0.55; z-index:1; }
  .card.curr{ transform: translateX(0) rotate(0) scale(1); opacity:1; z-index:2; }
  .card.empty{ border-style:dashed; background:rgba(255,248,236,0.06); color:var(--card); }
  .card.empty .name{ -webkit-line-clamp:4; }

  .posrow{ display:flex; align-items:center; gap:14px; margin-top:10px; }
  .navbtn{
    width:34px; height:34px; border-radius:50%; border:1px solid var(--line);
    background:rgba(255,248,236,0.06); color:var(--card); display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .navbtn:active{ background:rgba(255,248,236,0.16); }
  .posrow .count{ font-size:12px; color: rgba(255,248,236,0.6); min-width:56px; text-align:center; }

  .buttonzone{ display:flex; flex-direction:column; align-items:center; margin-top: 18px; }
  .arcade{
    width:150px; height:150px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #ff8595, var(--coral) 65%);
    border: none; cursor:pointer; position:relative;
    box-shadow: 0 10px 0 #b8394a, 0 16px 20px rgba(0,0,0,0.45);
    transform: translateY(0);
    transition: transform .08s ease, box-shadow .08s ease;
    display:flex; align-items:center; justify-content:center;
    touch-action: none; -webkit-touch-callout: none;
  }
  .arcade:active, .arcade.pressed{
    transform: translateY(8px);
    box-shadow: 0 2px 0 #b8394a, 0 6px 12px rgba(0,0,0,0.4);
  }
  .arcade svg{ width:52px; height:52px; fill:var(--card); filter: drop-shadow(0 2px 2px rgba(0,0,0,0.25)); }
  .arcade.playing{ animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 10px 0 #b8394a, 0 16px 20px rgba(0,0,0,0.45), 0 0 0 0 rgba(63,225,176,0.5); }
    50%{ box-shadow: 0 10px 0 #b8394a, 0 16px 20px rgba(0,0,0,0.45), 0 0 0 14px rgba(63,225,176,0); }
  }
  .taghint{ margin-top:10px; font-size:11px; color: rgba(255,248,236,0.4); letter-spacing:0.5px; text-transform:uppercase; }

  .quickadd{
    margin-top:12px; display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600;
    color:var(--teal); background: rgba(63,225,176,0.1); border:1px solid rgba(63,225,176,0.35);
    padding:7px 12px; border-radius:999px; cursor:pointer;
  }

  .speedzone{
    margin-top:14px; width:100%; max-width:280px; display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .speedrow{ display:flex; align-items:center; gap:10px; width:100%; }
  .speedstep{
    width:28px; height:28px; border-radius:50%; border:1px solid var(--line);
    background:rgba(255,248,236,0.06); color:var(--card); display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0; font-size:16px; font-weight:700; line-height:1;
  }
  .speedstep:active{ background:rgba(255,248,236,0.16); }
  .speedslider{
    flex:1; -webkit-appearance:none; appearance:none; height:4px; border-radius:999px;
    background: rgba(255,248,236,0.18); outline:none;
  }
  .speedslider::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:18px; height:18px; border-radius:50%;
    background:var(--yellow); cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.4);
  }
  .speedslider::-moz-range-thumb{
    width:18px; height:18px; border-radius:50%; border:none;
    background:var(--yellow); cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.4);
  }
  .speedval{
    font-size:13px; font-weight:700; color:var(--yellow); min-width:52px; text-align:center; cursor:pointer;
  }
  .speedpresets{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .speedchip{
    font-size:11px; padding:5px 10px; border-radius:999px; border:1px solid var(--line); cursor:pointer;
    background:rgba(255,248,236,0.05); color: rgba(255,248,236,0.7); font-family:'JetBrains Mono', monospace;
  }
  .speedchip.on{ background:var(--yellow); color:var(--ink); border-color:var(--yellow); font-weight:700; }

  .speedlock{
    width:28px; height:28px; border-radius:50%; border:1px solid var(--line);
    background:rgba(255,248,236,0.06); color: rgba(255,248,236,0.6); display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
  }
  .speedlock svg{ fill:currentColor; }
  .speedlock.on{ background:var(--yellow); color:var(--ink); border-color:var(--yellow); }
  .speedlockhint{ font-size:10px; letter-spacing:0.3px; color: rgba(255,248,236,0.35); text-transform:uppercase; }

  .focusOverlay{
    position:fixed; inset:0; z-index:60;
    background:
      radial-gradient(circle at 15% 8%, rgba(255,93,115,0.16), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(63,225,176,0.14), transparent 45%),
      var(--bg-deep);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition: opacity .2s ease;
    touch-action:none;
  }
  .focusOverlay.open{ opacity:1; pointer-events:all; }
  .focusName{
    position:absolute; top: max(28px, env(safe-area-inset-top)); left:20px; right:20px;
    text-align:center; font-family:'Fredoka',sans-serif; font-size:15px;
    color: rgba(255,248,236,0.4); font-weight:600; pointer-events:none;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .focusBtn{
    width:min(72vw, 62vh, 480px); height:min(72vw, 62vh, 480px); border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #ff8595, var(--coral) 65%);
    box-shadow: 0 10px 0 #b8394a, 0 16px 30px rgba(0,0,0,0.5);
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .focusBtn svg{ width:22%; height:22%; fill:var(--card); filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }
  .focusBtn.playing{ animation: pulse 1.1s ease-in-out infinite; }
  .focusHint{
    position:absolute; bottom: max(30px, env(safe-area-inset-bottom)); left:20px; right:20px;
    text-align:center; font-size:11px; letter-spacing:0.4px; text-transform:uppercase;
    color: rgba(255,248,236,0.35); pointer-events:none;
  }

  .bottombar{
    flex-shrink:0; padding: 12px 16px max(16px, env(safe-area-inset-bottom));
  }
  .addbtn{
    width:100%; padding:15px; border-radius:16px; border:none; cursor:pointer;
    background: var(--yellow); color:var(--ink); font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    box-shadow: 0 4px 0 #c9a222;
  }
  .addbtn:active{ transform: translateY(3px); box-shadow: 0 1px 0 #c9a222; }

  .overlay{
    position:fixed; inset:0; background: rgba(18,13,36,0.92); backdrop-filter: blur(6px);
    z-index:20; display:flex; flex-direction:column; opacity:0; pointer-events:none; transition: opacity .2s ease;
  }
  .overlay.open{ opacity:1; pointer-events:all; }
  .modalhead{
    display:flex; align-items:center; justify-content:space-between; padding: max(16px, env(safe-area-inset-top)) 18px 10px;
  }
  .modalhead h2{ font-family:'Fredoka',sans-serif; font-size:19px; margin:0; }
  .tabs{ display:flex; gap:8px; padding: 4px 18px 14px; }
  .tab{ flex:1; text-align:center; padding:9px; border-radius:12px; font-weight:600; font-size:13px; background:rgba(255,248,236,0.06); cursor:pointer; }
  .tab.active{ background:var(--teal); color:var(--ink); }
  .modalbody{ flex:1; overflow-y:auto; padding: 0 18px 24px; }

  .row{
    display:flex; align-items:center; gap:10px; padding:12px; border-radius:14px;
    background: rgba(255,248,236,0.05); border:1px solid var(--line); margin-bottom:8px;
  }
  .row .rowplay{
    width:34px; height:34px; border-radius:50%; background:var(--coral); border:none; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .row .rowplay svg{ width:16px; height:16px; fill:var(--card); }
  .row .rowinfo{ flex:1; min-width:0; }
  .row .rowname{ font-weight:600; font-size:14px; background:none; border:none; color:var(--card); width:100%; font-family:'Inter',sans-serif; padding:2px 0; }
  .row .rowname:focus{ outline:none; border-bottom:1px solid var(--teal); }
  .row .rowtags{ font-size:11px; color: rgba(255,248,236,0.45); margin-top:2px; }
  .row .rowbtn{ width:32px; height:32px; border-radius:9px; border:1px solid var(--line); background:transparent; color:var(--card); cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .row .rowbtn.danger{ color:var(--coral); border-color: rgba(255,93,115,0.4); }
  .triggerpill{
    font-size:10px; font-weight:700; padding:6px 9px; border-radius:8px; border:1px solid var(--line);
    background:rgba(255,248,236,0.05); color: rgba(255,248,236,0.6); cursor:pointer; flex-shrink:0;
    font-family:'JetBrains Mono', monospace; letter-spacing:0.2px; white-space:nowrap;
  }
  .triggerpill.doubletap{ border-color: rgba(63,225,176,0.45); color:var(--teal); }
  .triggerpill.hold{ border-color: rgba(255,210,63,0.45); color:var(--yellow); }
  .triggerpill.loud{ border-color: rgba(255,93,115,0.45); color:var(--coral); }

  .triggerOptions{ display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .triggerOption{
    display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-radius:12px;
    border:1px solid rgba(36,28,66,0.15); background: rgba(36,28,66,0.04); cursor:pointer;
  }
  .triggerOption .toName{ font-weight:600; font-size:14px; }
  .triggerOption .toDesc{ font-size:11px; color:var(--ink-soft); margin-top:2px; }
  .triggerOption .toCheck{ width:20px; height:20px; border-radius:50%; border:2px solid rgba(36,28,66,0.25); flex-shrink:0; }
  .triggerOption.on{ border-color: var(--coral); background: rgba(255,93,115,0.08); }
  .triggerOption.on .toCheck{ border-color:var(--coral); background:var(--coral); }
  .triggerPopoverHint{ font-size:11px; color:var(--ink-soft); margin-top:12px; text-align:center; }

  .plchecklist{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .plchip{
    font-size:11px; padding:5px 10px; border-radius:999px; border:1px solid var(--line); cursor:pointer;
    background:rgba(255,248,236,0.05); color: rgba(255,248,236,0.7);
  }
  .plchip.on{ background:var(--teal); color:var(--ink); border-color:var(--teal); font-weight:600; }

  .newplrow{ display:flex; gap:8px; margin-bottom:14px; }
  .newplrow input{
    flex:1; padding:11px 14px; border-radius:12px; border:1px solid var(--line); background:rgba(255,248,236,0.06);
    color:var(--card); font-size:14px; font-family:'Inter',sans-serif;
  }
  .newplrow input::placeholder{ color: rgba(255,248,236,0.35); }
  .newplrow button{
    padding:0 18px; border-radius:12px; border:none; background:var(--teal); color:var(--ink); font-weight:700; cursor:pointer;
  }

  .empty{ text-align:center; padding: 40px 20px; color: rgba(255,248,236,0.5); }
  .empty .big{ font-family:'Fredoka',sans-serif; font-size:17px; color:var(--card); margin-bottom:6px; }

  .popover{
    position:fixed; left:50%; bottom:0; transform: translateX(-50%) translateY(100%);
    width:min(420px, 100%); background:var(--card); color:var(--ink); border-radius:20px 20px 0 0;
    padding: 18px 18px max(18px, env(safe-area-inset-bottom)); z-index:30; transition: transform .25s ease;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.4);
  }
  .popover.open{ transform: translateX(-50%) translateY(0); }
  .popover h3{ margin:0 0 10px; font-family:'Fredoka',sans-serif; font-size:16px; }
  .popover .plchip{ color: var(--ink-soft); border-color: rgba(36,28,66,0.2); }
  .popover .plchip.on{ background:var(--coral); color:var(--card); border-color:var(--coral); }
  .scrim{ position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:25; opacity:0; pointer-events:none; transition:opacity .2s;}
  .scrim.open{ opacity:1; pointer-events:all; }

  .plmembers{ margin: 4px 0 10px; padding-left:6px; border-left:2px solid rgba(255,248,236,0.12); }
  .plmember{ display:flex; align-items:center; gap:8px; padding:7px 6px; font-size:12.5px; }
  .plmember .pmname{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color: rgba(255,248,236,0.85); }
  .plmember .pmplay{ width:22px; height:22px; border-radius:50%; background:rgba(63,225,176,0.18); border:none; color:var(--teal); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .plmember .pmplay svg{ width:10px; height:10px; fill:currentColor; }
  .plmember .pmremove{ width:22px; height:22px; border-radius:50%; background:transparent; border:1px solid var(--line); color: rgba(255,248,236,0.5); cursor:pointer; flex-shrink:0; font-size:12px; line-height:1; display:flex; align-items:center; justify-content:center; }
  .plmembersempty{ font-size:12px; color: var(--ink-soft); padding:4px 6px 10px; font-style:italic; }

  .confirmScrim{
    position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:70; opacity:0; pointer-events:none; transition:opacity .18s;
  }
  .confirmScrim.open{ opacity:1; pointer-events:all; }
  .confirmBox{
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(0.94);
    width:min(320px, 86vw); background:var(--card); color:var(--ink); border-radius:18px;
    padding:20px; z-index:75; opacity:0; pointer-events:none; transition: opacity .18s ease, transform .18s ease;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  .confirmBox.open{ opacity:1; pointer-events:all; transform:translate(-50%,-50%) scale(1); }
  .confirmMsg{ font-size:14px; line-height:1.4; margin-bottom:16px; }
  .confirmBtns{ display:flex; gap:10px; }
  .confirmBtn{ flex:1; padding:11px; border-radius:12px; border:none; font-weight:700; font-size:14px; cursor:pointer; font-family:'Inter',sans-serif; }
  .confirmBtn.cancel{ background: rgba(36,28,66,0.08); color:var(--ink); }
  .confirmBtn.delete{ background:var(--coral); color:var(--card); }

  input[type=file]{
    position:absolute;
    width:1px; height:1px;
    padding:0; margin:-1px;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
    border:0;
  }
  audio{ display:none; }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand"><span class="dot"></span>Meme Board</div>
    <div style="display:flex; gap:8px;">
      <button class="iconbtn" id="focusModeBtn" aria-label="Focus mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      </button>
      <button class="iconbtn" id="libraryBtn" aria-label="Library">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      </button>
    </div>
  </div>

  <div class="chiprow" id="chipRow"></div>

  <div class="stage">
    <div class="stack" id="stack"></div>

    <div class="posrow">
      <div class="navbtn" id="prevBtn">‹</div>
      <div class="count mono" id="countLbl">0 / 0</div>
      <div class="navbtn" id="nextBtn">›</div>
    </div>

    <div class="buttonzone">
      <button class="arcade" id="arcadeBtn" aria-label="Play sound">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <div class="taghint">tap to play &middot; swipe to skip</div>
      <div class="quickadd" id="quickAddBtn">＋ add to playlist</div>

      <div class="speedzone">
        <div class="speedrow">
          <div class="speedstep" id="speedDownBtn" aria-label="Slower">−</div>
          <input type="range" class="speedslider" id="speedSlider" min="0.25" max="5" step="0.05" value="1">
          <div class="speedstep" id="speedUpBtn" aria-label="Faster">+</div>
          <div class="speedlock" id="speedLockBtn" aria-label="Lock speed" title="Lock speed across sounds">
            <svg id="lockClosedIcon" viewBox="0 0 24 24" width="15" height="15"><path d="M6 10V8a6 6 0 0 1 12 0v2h1a1 1 0 0 1 1 1v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a1 1 0 0 1 1-1h1zm2 0h8V8a4 4 0 0 0-8 0v2z"/></svg>
            <svg id="lockOpenIcon" viewBox="0 0 24 24" width="15" height="15" style="display:none"><path d="M6 10V8a6 6 0 0 1 11.6-2.2 1 1 0 1 1-1.86.74A4 4 0 0 0 8 8v2h9a1 1 0 0 1 1 1v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a1 1 0 0 1 1-1h1z"/></svg>
          </div>
        </div>
        <div class="speedval mono" id="speedVal" title="Tap to reset to 1x">1.00x</div>
        <div class="speedpresets" id="speedPresets"></div>
        <div class="speedlockhint" id="speedLockHint">unlocked &middot; resets to 1x on skip</div>
      </div>
    </div>
  </div>

  <div class="bottombar">
    <button class="addbtn" id="addSoundBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Add sounds
    </button>
  </div>

  <input type="file" id="fileInput" accept="audio/*,.mp3,.m4a,.wav,.aac,.ogg,.flac,video/*,.mp4,.mov" multiple>
  <audio id="player"></audio>

  <div class="focusOverlay" id="focusOverlay">
    <div class="focusName" id="focusName">&nbsp;</div>
    <div class="focusBtn" id="focusBtn">
      <svg id="focusPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="focusPauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </div>
    <div class="focusHint">tap to play &middot; swipe to skip &middot; swipe up/down to exit</div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modalhead">
      <h2 id="modalTitle">Library</h2>
      <button class="iconbtn" id="closeOverlay">✕</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="sounds">Sounds</div>
      <div class="tab" data-tab="playlists">Playlists</div>
    </div>
    <div class="modalbody" id="modalBody"></div>
  </div>

  <div class="scrim" id="scrim"></div>
  <div class="popover" id="popover">
    <h3 id="popoverTitle">Add to playlist</h3>
    <div class="plchecklist" id="popoverList"></div>
    <div class="newplrow" style="margin-top:14px;">
      <input type="text" id="popoverNewName" placeholder="New playlist name">
      <button id="popoverNewBtn">Create</button>
    </div>
  </div>

  <div class="popover" id="triggerPopover">
    <h3>Play trigger</h3>
    <div class="triggerOptions" id="triggerOptionsList"></div>
    <div class="triggerPopoverHint">The rest of your sounds stay one-tap by default.</div>
  </div>

  <div class="confirmScrim" id="confirmScrim"></div>
  <div class="confirmBox" id="confirmBox">
    <div class="confirmMsg" id="confirmMsg"></div>
    <div class="confirmBtns">
      <button class="confirmBtn cancel" id="confirmCancelBtn">Cancel</button>
      <button class="confirmBtn delete" id="confirmOkBtn">Delete</button>
    </div>
  </div>

<script>
(function(){
  const $ = (sel, el=document) => el.querySelector(sel);
  const $$ = (sel, el=document) => Array.from(el.querySelectorAll(sel));

  let clips = [];
  let playlists = [];
  let expandedPlaylists = new Set();
  let currentPlaylistId = 'all';
  let currentIndex = 0;
  let isPlaying = false;
  let playbackRate = 1;
  let speedLocked = true;

  const player = $('#player');
  const stack = $('#stack');
  const chipRow = $('#chipRow');
  const arcadeBtn = $('#arcadeBtn');
  const playIcon = $('#playIcon');
  const pauseIcon = $('#pauseIcon');
  const countLbl = $('#countLbl');
  const speedSlider = $('#speedSlider');
  const speedVal = $('#speedVal');
  const speedPresets = $('#speedPresets');
  const speedLockBtn = $('#speedLockBtn');
  const speedLockHint = $('#speedLockHint');
  const lockClosedIcon = $('#lockClosedIcon');
  const lockOpenIcon = $('#lockOpenIcon');
  const focusOverlay = $('#focusOverlay');
  const focusBtn = $('#focusBtn');
  const focusName = $('#focusName');
  const focusPlayIcon = $('#focusPlayIcon');
  const focusPauseIcon = $('#focusPauseIcon');
  let focusMode = false;

  const uid = () => 'id_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);

  const GH_OWNER = 'Davitayvaz';
  const GH_REPO = 'DDP-Tap';
  const GH_SOUNDS_FOLDER = 'Sounds';

  const TRIGGER_LABELS = { tap: 'TAP', doubletap: '2X TAP', hold: 'HOLD', loud: 'LOUD' };
  const TRIGGER_ORDER = ['tap', 'doubletap', 'hold', 'loud'];
  const TRIGGER_HINTS = {
    tap: 'Tap to play',
    doubletap: 'Double-tap to play',
    hold: 'Hold to play',
    loud: 'Make a loud sound to trigger this one'
  };
  function clipTriggerType(clip){
    return (clip && TRIGGER_LABELS[clip.trigger]) ? clip.trigger : 'tap';
  }

  const DB_NAME = 'memeBoardDB';
  const STORE_NAME = 'kv';
  let dbPromise = null;

  function openDB(){
    if(dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        req.result.createObjectStore(STORE_NAME, { keyPath: 'key' });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbPromise;
  }

  async function safeGet(key){
    try{
      const db = await openDB();
      return await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).get(key);
        req.onsuccess = () => resolve(req.result ? req.result.value : null);
        req.onerror = () => reject(req.error);
      });
    }catch(e){ console.error('storage get failed', e); return null; }
  }
  async function safeSet(key, value){
    try{
      const db = await openDB();
      return await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put({ key, value });
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
    }catch(e){ console.error('storage set failed', e); alertBanner('Could not save — your browser storage may be full.'); return null; }
  }
  async function safeDelete(key){
    try{
      const db = await openDB();
      return await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).delete(key);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
    }catch(e){ console.error('storage delete failed', e); return null; }
  }
  async function safeList(prefix){
    try{
      const db = await openDB();
      const keys = await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).getAllKeys();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
      return prefix ? keys.filter(k => typeof k === 'string' && k.startsWith(prefix)) : keys;
    }catch(e){ console.error('storage list failed', e); return []; }
  }

  async function loadSharedLibrary(){
    const audioExt = /\.(mp3|wav|m4a|ogg|aac|flac)$/i;
    try{
      const res = await fetch(
        `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_SOUNDS_FOLDER}`,
        { cache: 'no-store' }
      );
      if(!res.ok) throw new Error('GitHub API error ' + res.status);
      const list = await res.json();
      if(!Array.isArray(list)) throw new Error('Unexpected response shape');

      const shared = list
        .filter(item => item.type === 'file' && audioExt.test(item.name))
        .map(item => ({
          id: 'shared_' + item.name.replace(/[^a-zA-Z0-9]/g, '_'),
          name: item.name.replace(/\.[^/.]+$/, '').replace(/[-_]+/g, ' ').trim(),
          src: item.download_url,
          shared: true,
          createdAt: 0
        }));

      await safeSet('shared-cache', JSON.stringify(shared));
      return shared;
    }catch(e){
      console.warn('Could not reach GitHub for shared sounds, trying cache', e);
      const cached = await safeGet('shared-cache');
      if(cached){
        try{ return JSON.parse(cached); }catch(_){}
      }
      return [];
    }
  }

  async function loadAll(){
    const sharedClips = await loadSharedLibrary();

    const clipKeys = await safeList('clip:');
    let personalClips = [];
    for(const k of clipKeys){
      const v = await safeGet(k);
      if(v){ try{ personalClips.push(JSON.parse(v)); }catch(e){} }
    }
    personalClips.sort((a,b)=> (a.createdAt||0) - (b.createdAt||0));

    clips = [...sharedClips, ...personalClips];

    const triggerKeys = await safeList('trigger:');
    for(const k of triggerKeys){
      const v = await safeGet(k);
      if(!v) continue;
      try{
        const trig = JSON.parse(v);
        const clipId = k.slice('trigger:'.length);
        const c = clips.find(c => c.id === clipId);
        if(c && TRIGGER_LABELS[trig]) c.trigger = trig;
      }catch(e){}
    }

    const plKeys = await safeList('playlist:');
    playlists = [];
    for(const k of plKeys){
      const v = await safeGet(k);
      if(v){ try{ playlists.push(JSON.parse(v)); }catch(e){} }
    }

    const state = await safeGet('ui-state');
    if(state){
      try{
        const s = JSON.parse(state);
        currentPlaylistId = s.currentPlaylistId || 'all';
        currentIndex = s.currentIndex || 0;
        if(typeof s.playbackRate === 'number' && !isNaN(s.playbackRate)){
          playbackRate = s.playbackRate;
        }
        if(typeof s.speedLocked === 'boolean'){
          speedLocked = s.speedLocked;
        }
      }catch(e){}
    }
    if(currentPlaylistId !== 'all' && !playlists.find(p=>p.id===currentPlaylistId)){
      currentPlaylistId = 'all';
    }
    applySpeed(playbackRate, false);
    applyLockVisual();
    render();
  }

  function saveUiState(){
    safeSet('ui-state', JSON.stringify({currentPlaylistId, currentIndex, playbackRate, speedLocked}));
  }

  function activeClips(){
    if(currentPlaylistId === 'all') return clips;
    const pl = playlists.find(p=>p.id===currentPlaylistId);
    if(!pl) return clips;
    return pl.clipIds.map(id => clips.find(c=>c.id===id)).filter(Boolean);
  }

  function currentClip(){
    const list = activeClips();
    if(list.length===0) return null;
    if(currentIndex >= list.length) currentIndex = list.length - 1;
    if(currentIndex < 0) currentIndex = 0;
    return list[currentIndex];
  }

  function render(){
    renderChips();
    renderStack();
    saveUiState();
  }

  function renderChips(){
    chipRow.innerHTML = '';
    const all = document.createElement('div');
    all.className = 'chip' + (currentPlaylistId==='all' ? ' active':'');
    all.textContent = 'All Sounds';
    all.onclick = () => { currentPlaylistId='all'; currentIndex=0; stopAudio(); resetSpeedOnSwitch(); render(); };
    chipRow.appendChild(all);

    playlists.forEach(pl => {
      const c = document.createElement('div');
      c.className = 'chip' + (currentPlaylistId===pl.id ? ' active':'');
      c.textContent = pl.name;
      c.onclick = () => { currentPlaylistId=pl.id; currentIndex=0; stopAudio(); resetSpeedOnSwitch(); render(); };
      chipRow.appendChild(c);
    });

    const add = document.createElement('div');
    add.className = 'chip addnew';
    add.textContent = '+ New';
    add.onclick = () => openLibrary('playlists');
    chipRow.appendChild(add);
  }

  function cardHtml(clip, cls){
    if(!clip){
      return `<div class="card empty ${cls}"><div class="name">No sounds here yet</div><div class="len">tap "Add sounds" below</div></div>`;
    }
    return `<div class="card ${cls}"><div class="name">${escapeHtml(clip.name)}</div></div>`;
  }

  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function renderStack(){
    const list = activeClips();
    stack.innerHTML = '';
    if(list.length === 0){
      stack.insertAdjacentHTML('beforeend', cardHtml(null, 'curr'));
      countLbl.textContent = '0 / 0';
      focusName.textContent = 'No sounds yet';
      setPlayingVisual(false);
      return;
    }
    const prev = list[(currentIndex - 1 + list.length) % list.length];
    const curr = list[currentIndex];
    const next = list[(currentIndex + 1) % list.length];
    if(list.length > 2) stack.insertAdjacentHTML('beforeend', cardHtml(prev, 'prev side'));
    if(list.length > 1) stack.insertAdjacentHTML('beforeend', cardHtml(next, 'next side'));
    stack.insertAdjacentHTML('beforeend', cardHtml(curr, 'curr'));
    countLbl.textContent = `${currentIndex+1} / ${list.length}`;
    focusName.textContent = curr ? curr.name : 'No sounds yet';
  }

  function stopAudio(){
    player.pause();
    player.currentTime = 0;
    isPlaying = false;
    setPlayingVisual(false);
  }

  function setPlayingVisual(playing){
    isPlaying = playing;
    arcadeBtn.classList.toggle('playing', playing);
    playIcon.style.display = playing ? 'none' : '';
    pauseIcon.style.display = playing ? '' : 'none';
    focusBtn.classList.toggle('playing', playing);
    focusPlayIcon.style.display = playing ? 'none' : '';
    focusPauseIcon.style.display = playing ? '' : 'none';
  }

  // ---- Speed control ----
  const SPEED_PRESETS = [0.5, 1, 1.5, 2, 3];

  function clampSpeed(r){
    if(isNaN(r)) return 1;
    return Math.min(5, Math.max(0.25, r));
  }

  function applySpeed(rate, persist){
    playbackRate = clampSpeed(rate);
    player.playbackRate = playbackRate;
    // Let pitch shift with speed for that classic chipmunk/demon-voice effect
    try{ player.preservesPitch = false; }catch(e){}
    try{ player.mozPreservesPitch = false; }catch(e){}
    try{ player.webkitPreservesPitch = false; }catch(e){}
    speedSlider.value = playbackRate;
    speedVal.textContent = playbackRate.toFixed(2) + 'x';
    renderSpeedPresets();
    if(persist !== false) saveUiState();
  }

  function renderSpeedPresets(){
    speedPresets.innerHTML = '';
    SPEED_PRESETS.forEach(p => {
      const chip = document.createElement('div');
      chip.className = 'speedchip' + (Math.abs(playbackRate - p) < 0.001 ? ' on' : '');
      chip.textContent = p + 'x';
      chip.onclick = () => applySpeed(p);
      speedPresets.appendChild(chip);
    });
  }

  speedSlider.addEventListener('input', () => applySpeed(parseFloat(speedSlider.value)));
  $('#speedDownBtn').onclick = () => applySpeed(playbackRate - 0.25);
  $('#speedUpBtn').onclick = () => applySpeed(playbackRate + 0.25);
  speedVal.onclick = () => applySpeed(1);

  function applyLockVisual(){
    speedLockBtn.classList.toggle('on', speedLocked);
    lockClosedIcon.style.display = speedLocked ? '' : 'none';
    lockOpenIcon.style.display = speedLocked ? 'none' : '';
    speedLockHint.textContent = speedLocked
      ? 'locked · speed carries over between sounds'
      : 'unlocked · resets to 1x on skip';
  }
  speedLockBtn.onclick = () => {
    speedLocked = !speedLocked;
    applyLockVisual();
    saveUiState();
  };

  function resetSpeedOnSwitch(){
    if(!speedLocked) applySpeed(1);
  }

  let loadedClipId = null;
  function playCurrent(){
    const clip = currentClip();
    if(!clip){ alertBanner('Add a sound first!'); return; }
    const src = clip.dataUrl || clip.src;
    if(loadedClipId !== clip.id){
      player.src = src;
      loadedClipId = clip.id;
    }
    player.currentTime = 0;
    player.playbackRate = playbackRate;
    try{ player.preservesPitch = false; }catch(e){}
    try{ player.mozPreservesPitch = false; }catch(e){}
    try{ player.webkitPreservesPitch = false; }catch(e){}
    player.play().then(()=> setPlayingVisual(true)).catch((err)=>{
      console.error('playback failed', err);
      alertBanner('Could not play that clip — try re-adding the file.');
      setPlayingVisual(false);
    });
  }

  function nudgeWrongTrigger(clip){
    alertBanner(TRIGGER_HINTS[clipTriggerType(clip)] || 'Tap to play');
  }

  function handleGestureTap(){
    if(isPlaying){ stopAudio(); return; }
    const clip = currentClip();
    if(!clip){ alertBanner('Add a sound first!'); return; }
    if(clipTriggerType(clip) === 'tap'){ playCurrent(); }
    else { nudgeWrongTrigger(clip); }
  }
  function handleGestureDoubleTap(){
    if(isPlaying){ stopAudio(); return; }
    const clip = currentClip();
    if(!clip){ alertBanner('Add a sound first!'); return; }
    if(clipTriggerType(clip) === 'doubletap'){ playCurrent(); }
    else { nudgeWrongTrigger(clip); }
  }
  function handleGestureHold(){
    if(isPlaying){ stopAudio(); return; }
    const clip = currentClip();
    if(!clip) return;
    if(clipTriggerType(clip) === 'hold'){ playCurrent(); }
    else { nudgeWrongTrigger(clip); }
  }

  function attachGesture(el, handlers){
    let downX = 0, downY = 0;
    let holdTimer = null, holdFired = false;
    let tapTimer = null, lastTapAt = 0;

    function clearHoldTimer(){ if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; } }
    function clearTapTimer(){ if(tapTimer){ clearTimeout(tapTimer); tapTimer = null; } }

    el.addEventListener('contextmenu', (e) => e.preventDefault());

    el.addEventListener('pointerdown', (e) => {
      downX = e.clientX; downY = e.clientY;
      holdFired = false;
      clearHoldTimer();
      if(handlers.onHold){
        holdTimer = setTimeout(() => { holdFired = true; handlers.onHold(); }, 450);
      }
    });

    el.addEventListener('pointermove', (e) => {
      if(holdTimer){
        const dx = e.clientX - downX, dy = e.clientY - downY;
        if(Math.abs(dx) > 12 || Math.abs(dy) > 12) clearHoldTimer();
      }
    });

    el.addEventListener('pointerup', (e) => {
      clearHoldTimer();
      if(holdFired) return;
      const dx = e.clientX - downX, dy = e.clientY - downY;
      const adx = Math.abs(dx), ady = Math.abs(dy);

      if((handlers.onSwipeNext || handlers.onSwipePrev) && adx > 40 && adx > ady){
        dx < 0 ? handlers.onSwipeNext && handlers.onSwipeNext() : handlers.onSwipePrev && handlers.onSwipePrev();
        return;
      }
      if(handlers.onSwipeVertical && ady > 60 && ady > adx){
        handlers.onSwipeVertical();
        return;
      }
      if(adx < 12 && ady < 12){
        const now = Date.now();
        if(handlers.onDoubleTap && (now - lastTapAt) < 300){
          clearTapTimer();
          lastTapAt = 0;
          handlers.onDoubleTap();
        } else {
          lastTapAt = now;
          if(handlers.onDoubleTap){
            clearTapTimer();
            tapTimer = setTimeout(() => { handlers.onTap && handlers.onTap(); }, 300);
          } else {
            handlers.onTap && handlers.onTap();
          }
        }
      }
    });

    el.addEventListener('pointercancel', () => { clearHoldTimer(); });
  }

  attachGesture(arcadeBtn, { onTap: handleGestureTap, onDoubleTap: handleGestureDoubleTap, onHold: handleGestureHold });
  player.addEventListener('ended', () => setPlayingVisual(false));

  function goTo(delta){
    const list = activeClips();
    if(list.length === 0) return;
    currentIndex = (currentIndex + delta + list.length) % list.length;
    stopAudio();
    resetSpeedOnSwitch();
    renderStack();
    saveUiState();
  }
  $('#prevBtn').onclick = () => goTo(-1);
  $('#nextBtn').onclick = () => goTo(1);

  let touchStartX = null, touchStartY = null, dragging = false;
  stack.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; dragging = true;
  }, {passive:true});
  stack.addEventListener('touchend', (e) => {
    if(!dragging || touchStartX===null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){
      goTo(dx < 0 ? 1 : -1);
    }
    dragging = false; touchStartX = null;
  });
  let mouseDownX = null;
  stack.addEventListener('mousedown', (e) => { mouseDownX = e.clientX; });
  stack.addEventListener('mouseup', (e) => {
    if(mouseDownX===null) return;
    const dx = e.clientX - mouseDownX;
    if(Math.abs(dx) > 40) goTo(dx < 0 ? 1 : -1);
    mouseDownX = null;
  });

  function openFocusMode(){
    focusMode = true;
    focusOverlay.classList.add('open');
  }
  function closeFocusMode(){
    focusMode = false;
    focusOverlay.classList.remove('open');
  }
  $('#focusModeBtn').onclick = openFocusMode;

  document.addEventListener('keydown', (e) => {
    if(focusMode){
      if(e.key === 'Escape' || e.key === 'ArrowUp' || e.key === 'ArrowDown'){
        e.preventDefault();
        closeFocusMode();
        return;
      }
    } else if(e.key === 'f' || e.key === 'F'){
      openFocusMode();
      return;
    }
    if(e.key === 'ArrowLeft') goTo(-1);
    if(e.key === 'ArrowRight') goTo(1);
    if(e.key === ' '){ e.preventDefault(); handleGestureTap(); }
  });

  attachGesture(focusOverlay, {
    onTap: handleGestureTap,
    onDoubleTap: handleGestureDoubleTap,
    onHold: handleGestureHold,
    onSwipeNext: () => goTo(1),
    onSwipePrev: () => goTo(-1),
    onSwipeVertical: closeFocusMode
  });

  $('#addSoundBtn').onclick = () => $('#fileInput').click();
  $('#fileInput').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    for(const file of files){
      await addClipFromFile(file);
    }
    e.target.value = '';
    render();
  });

  function readFileAsDataUrl(file){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = () => reject(r.error);
      r.readAsDataURL(file);
    });
  }

  async function addClipFromFile(file){
    if(file.size > 25 * 1024 * 1024){
      alertBanner(`"${file.name}" is too big (keep clips under ~25MB).`);
      return;
    }
    try{
      const dataUrl = await readFileAsDataUrl(file);
      const clip = { id: uid(), name: file.name.replace(/\.[^/.]+$/, ''), dataUrl, createdAt: Date.now() };
      const res = await safeSet('clip:' + clip.id, JSON.stringify(clip));
      if(res) clips.push(clip);
    }catch(e){ console.error(e); }
  }

  function alertBanner(msg){
    const b = document.createElement('div');
    b.textContent = msg;
    b.style.cssText = 'position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#241C42;color:#FFF8EC;padding:10px 16px;border-radius:12px;font-size:13px;z-index:99;box-shadow:0 6px 20px rgba(0,0,0,0.4);max-width:88%;text-align:center;';
    document.body.appendChild(b);
    setTimeout(()=> b.remove(), 2600);
  }

  const overlay = $('#overlay');
  const modalBody = $('#modalBody');
  const modalTitle = $('#modalTitle');
  let activeTab = 'sounds';

  function openLibrary(tab){
    activeTab = tab || 'sounds';
    $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeTab));
    overlay.classList.add('open');
    renderModal();
  }
  $('#libraryBtn').onclick = () => openLibrary('sounds');
  $('#closeOverlay').onclick = () => overlay.classList.remove('open');
  $$('.tab').forEach(t => t.onclick = () => { activeTab = t.dataset.tab; $$('.tab').forEach(x=>x.classList.toggle('active', x===t)); renderModal(); });

  function renderModal(){
    modalTitle.textContent = activeTab === 'sounds' ? 'Sounds' : 'Playlists';
    if(activeTab === 'sounds') renderSoundsTab();
    else renderPlaylistsTab();
  }

  function renderSoundsTab(){
    if(clips.length === 0){
      modalBody.innerHTML = `<div class="empty"><div class="big">No sounds yet</div>Tap "Add sounds" to upload your first clip.</div>`;
      return;
    }
    modalBody.innerHTML = '';
    clips.forEach(clip => {
      const row = document.createElement('div');
      row.className = 'row';
      const memberOf = playlists.filter(p => p.clipIds.includes(clip.id));
      const isShared = !!clip.shared;
      row.innerHTML = `
        <button class="rowplay" aria-label="Preview"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        <div class="rowinfo">
          ${isShared
            ? `<div class="rowname" style="padding:2px 0;">${escapeHtml(clip.name)} <span class="mono" style="font-size:10px;color:var(--teal);">&middot; shared</span></div>`
            : `<input class="rowname" value="${escapeHtml(clip.name)}">`}
          <div class="rowtags">${memberOf.length ? memberOf.map(p=>p.name).join(', ') : 'Not in any playlist'}</div>
        </div>
        <button class="triggerpill ${clipTriggerType(clip)}" data-act="trigger">${TRIGGER_LABELS[clipTriggerType(clip)]}</button>
        <button class="rowbtn" data-act="tag">☰</button>
        ${isShared ? '' : '<button class="rowbtn danger" data-act="del">🗑</button>'}
      `;
      row.querySelector('.rowplay').onclick = () => {
        const a = new Audio(clip.dataUrl || clip.src); a.play().catch(()=>{});
      };
      row.querySelector('[data-act="trigger"]').onclick = () => openTriggerPicker(clip);
      if(!isShared){
        const nameInput = row.querySelector('.rowname');
        nameInput.addEventListener('change', async () => {
          clip.name = nameInput.value.trim() || clip.name;
          await safeSet('clip:' + clip.id, JSON.stringify(clip));
          render();
        });
        row.querySelector('[data-act="del"]').onclick = async () => {
          const ok = await confirmDelete(`Delete "${clip.name}"? This can't be undone.`);
          if(!ok) return;
          await safeDelete('clip:' + clip.id);
          await safeDelete('trigger:' + clip.id);
          playlists.forEach(p => { p.clipIds = p.clipIds.filter(id => id !== clip.id); safeSet('playlist:'+p.id, JSON.stringify(p)); });
          clips = clips.filter(c => c.id !== clip.id);
          renderSoundsTab();
          render();
        };
      }
      row.querySelector('[data-act="tag"]').onclick = () => openQuickAdd(clip);
      modalBody.appendChild(row);
    });
  }

  function renderPlaylistsTab(){
    modalBody.innerHTML = '';
    const newRow = document.createElement('div');
    newRow.className = 'newplrow';
    newRow.innerHTML = `<input type="text" placeholder="New playlist name" id="plNameInput"><button id="plCreateBtn">Create</button>`;
    modalBody.appendChild(newRow);
    $('#plCreateBtn').onclick = async () => {
      const input = $('#plNameInput');
      const name = input.value.trim();
      if(!name) return;
      const pl = { id: uid(), name, clipIds: [] };
      await safeSet('playlist:' + pl.id, JSON.stringify(pl));
      playlists.push(pl);
      input.value = '';
      renderPlaylistsTab();
      render();
    };

    if(playlists.length === 0){
      modalBody.insertAdjacentHTML('beforeend', `<div class="empty"><div class="big">No playlists yet</div>Create one above to group your favorite sounds.</div>`);
      return;
    }

    playlists.forEach(pl => {
      const isOpen = expandedPlaylists.has(pl.id);
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div class="rowinfo">
          <input class="rowname" value="${escapeHtml(pl.name)}">
          <div class="rowtags">${pl.clipIds.length} sound${pl.clipIds.length===1?'':'s'}</div>
        </div>
        <button class="rowbtn" data-act="expand" aria-label="View sounds in playlist">${isOpen ? '▴' : '▾'}</button>
        <button class="rowbtn danger" data-act="del">🗑</button>
      `;
      const nameInput = row.querySelector('.rowname');
      nameInput.addEventListener('change', async () => {
        pl.name = nameInput.value.trim() || pl.name;
        await safeSet('playlist:' + pl.id, JSON.stringify(pl));
        render();
      });
      row.querySelector('[data-act="expand"]').onclick = () => {
        if(isOpen) expandedPlaylists.delete(pl.id); else expandedPlaylists.add(pl.id);
        renderPlaylistsTab();
      };
      row.querySelector('[data-act="del"]').onclick = async () => {
        const ok = await confirmDelete(`Delete the playlist "${pl.name}"? The sounds themselves won't be deleted.`);
        if(!ok) return;
        await safeDelete('playlist:' + pl.id);
        playlists = playlists.filter(p => p.id !== pl.id);
        expandedPlaylists.delete(pl.id);
        if(currentPlaylistId === pl.id){ currentPlaylistId = 'all'; currentIndex = 0; }
        renderPlaylistsTab();
        render();
      };
      modalBody.appendChild(row);

      if(isOpen){
        const memberWrap = document.createElement('div');
        memberWrap.className = 'plmembers';
        const memberClips = pl.clipIds.map(id => clips.find(c=>c.id===id)).filter(Boolean);
        if(memberClips.length === 0){
          memberWrap.innerHTML = `<div class="plmembersempty">No sounds in this playlist yet.</div>`;
        } else {
          memberClips.forEach(clip => {
            const mrow = document.createElement('div');
            mrow.className = 'plmember';
            mrow.innerHTML = `
              <button class="pmplay" aria-label="Preview"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
              <div class="pmname">${escapeHtml(clip.name)}</div>
              <button class="pmremove" aria-label="Remove from playlist" title="Remove from playlist">✕</button>
            `;
            mrow.querySelector('.pmplay').onclick = () => {
              const a = new Audio(clip.dataUrl || clip.src); a.play().catch(()=>{});
            };
            mrow.querySelector('.pmremove').onclick = async () => {
              pl.clipIds = pl.clipIds.filter(id => id !== clip.id);
              await safeSet('playlist:' + pl.id, JSON.stringify(pl));
              renderPlaylistsTab();
              render();
            };
            memberWrap.appendChild(mrow);
          });
        }
        modalBody.appendChild(memberWrap);
      }
    });
  }

  const scrim = $('#scrim');
  const popover = $('#popover');
  let popoverClip = null;

  const triggerPopover = $('#triggerPopover');
  let triggerPopoverClip = null;

  const confirmScrim = $('#confirmScrim');
  const confirmBox = $('#confirmBox');
  const confirmMsg = $('#confirmMsg');
  const confirmCancelBtn = $('#confirmCancelBtn');
  const confirmOkBtn = $('#confirmOkBtn');

  function confirmDelete(message){
    return new Promise((resolve) => {
      confirmMsg.textContent = message;
      confirmScrim.classList.add('open');
      confirmBox.classList.add('open');
      function cleanup(result){
        confirmScrim.classList.remove('open');
        confirmBox.classList.remove('open');
        confirmScrim.removeEventListener('click', onCancel);
        confirmCancelBtn.removeEventListener('click', onCancel);
        confirmOkBtn.removeEventListener('click', onOk);
        resolve(result);
      }
      function onCancel(){ cleanup(false); }
      function onOk(){ cleanup(true); }
      confirmScrim.addEventListener('click', onCancel);
      confirmCancelBtn.addEventListener('click', onCancel);
      confirmOkBtn.addEventListener('click', onOk);
    });
  }

  function openQuickAdd(clip){
    closeTriggerPopover();
    popoverClip = clip;
    renderPopoverList();
    scrim.classList.add('open');
    popover.classList.add('open');
  }
  function closePopover(){
    scrim.classList.remove('open');
    popover.classList.remove('open');
    popoverClip = null;
  }
  function openTriggerPicker(clip){
    closePopover();
    triggerPopoverClip = clip;
    renderTriggerOptions();
    scrim.classList.add('open');
    triggerPopover.classList.add('open');
  }
  function closeTriggerPopover(){
    scrim.classList.remove('open');
    triggerPopover.classList.remove('open');
    triggerPopoverClip = null;
  }
  scrim.onclick = () => { closePopover(); closeTriggerPopover(); };

  function renderTriggerOptions(){
    const list = $('#triggerOptionsList');
    list.innerHTML = '';
    const current = clipTriggerType(triggerPopoverClip);
    TRIGGER_ORDER.forEach(key => {
      const opt = document.createElement('div');
      opt.className = 'triggerOption' + (current === key ? ' on' : '');
      opt.innerHTML = `
        <div>
          <div class="toName">${TRIGGER_LABELS[key]}</div>
          <div class="toDesc">${TRIGGER_HINTS[key]}</div>
        </div>
        <div class="toCheck"></div>
      `;
      opt.onclick = async () => {
        triggerPopoverClip.trigger = key;
        await safeSet('trigger:' + triggerPopoverClip.id, JSON.stringify(key));
        renderTriggerOptions();
        renderSoundsTab();
        closeTriggerPopover();
      };
      list.appendChild(opt);
    });
  }

  function renderPopoverList(){
    const list = $('#popoverList');
    list.innerHTML = '';
    if(playlists.length === 0){
      list.innerHTML = `<div style="font-size:12px;color:var(--ink-soft);">No playlists yet — create one below.</div>`;
    }
    playlists.forEach(pl => {
      const on = pl.clipIds.includes(popoverClip.id);
      const chip = document.createElement('div');
      chip.className = 'plchip' + (on ? ' on':'');
      chip.textContent = pl.name;
      chip.onclick = async () => {
        if(on) pl.clipIds = pl.clipIds.filter(id => id !== popoverClip.id);
        else pl.clipIds.push(popoverClip.id);
        await safeSet('playlist:' + pl.id, JSON.stringify(pl));
        renderPopoverList();
        renderSoundsTab();
        renderChips();
      };
      list.appendChild(chip);
    });
  }

  $('#popoverNewBtn').onclick = async () => {
    const input = $('#popoverNewName');
    const name = input.value.trim();
    if(!name) return;
    const pl = { id: uid(), name, clipIds: popoverClip ? [popoverClip.id] : [] };
    await safeSet('playlist:' + pl.id, JSON.stringify(pl));
    playlists.push(pl);
    input.value = '';
    if(popoverClip){ renderPopoverList(); renderSoundsTab(); renderChips(); }
  };

  $('#quickAddBtn').onclick = () => {
    const clip = currentClip();
    if(!clip){ alertBanner('Add a sound first!'); return; }
    openQuickAdd(clip);
  };

  loadAll();
})();
</script>
</body>
</html>
